<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced AI Financial Analyzer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    max-width:1400px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

button{
    background:#2563eb;
    border:none;
    padding:12px 25px;
    color:white;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

.score{
    font-size:45px;
    font-weight:bold;
}

.green{
    color:#22c55e;
}

.orange{
    color:#f59e0b;
}

.red{
    color:#ef4444;
}

.metric{
    margin-top:15px;
    padding:15px;
    background:#111827;
    border-radius:10px;
}

.metric h3{
    margin:0;
}

.metric p{
    font-size:22px;
    margin-top:10px;
}

input{
    margin-top:15px;
}

#dashboard{
    display:none;
}

.preview{
    max-height:300px;
    overflow:auto;
    font-size:13px;
    line-height:1.6;
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>📊 AI Financial Statement Analyzer</h1>

        <input type="file" id="pdfFile" accept=".pdf">

        <br>

        <button onclick="analyzePDF()">
            Analyze Financial Report
        </button>

    </div>

    <div id="dashboard">

        <div class="grid">

            <div class="card">
                <h2>Health Score</h2>
                <div class="score" id="healthScore"></div>
            </div>

            <div class="card">
                <h2>Risk Level</h2>
                <div id="riskLevel"></div>
            </div>

            <div class="card">
                <h2>Audit Opinion</h2>
                <div id="auditOpinion"></div>
            </div>

        </div>

        <!-- FINANCIAL DETAILS -->

        <div class="card">

            <h2>📈 Financial Metrics</h2>

            <div class="grid">

                <div class="metric">
                    <h3>Revenue</h3>
                    <p id="revenue">-</p>
                </div>

                <div class="metric">
                    <h3>Net Profit</h3>
                    <p id="profit">-</p>
                </div>

                <div class="metric">
                    <h3>Total Expenses</h3>
                    <p id="expense">-</p>
                </div>

                <div class="metric">
                    <h3>Operating Profit</h3>
                    <p id="operatingProfit">-</p>
                </div>

                <div class="metric">
                    <h3>EPS</h3>
                    <p id="eps">-</p>
                </div>

                <div class="metric">
                    <h3>ROE</h3>
                    <p id="roe">-</p>
                </div>

                <div class="metric">
                    <h3>ROCE</h3>
                    <p id="roce">-</p>
                </div>

                <div class="metric">
                    <h3>Debt</h3>
                    <p id="debt">-</p>
                </div>

                <div class="metric">
                    <h3>Cash Flow</h3>
                    <p id="cashflow">-</p>
                </div>

            </div>

        </div>

        <div class="card">

            <h2>⚠️ Red Flags</h2>

            <ul id="flags"></ul>

        </div>

        <div class="card">

            <h2>📊 Financial Health Chart</h2>

            <canvas id="chart"></canvas>

        </div>

        <div class="card">

            <h2>📄 Extracted Text Preview</h2>

            <div class="preview" id="preview"></div>

        </div>

    </div>

</div>

<script>

let chartObj = null;

async function extractText(file){

    const reader = new FileReader();

    return new Promise((resolve)=>{

        reader.onload = async function(){

            const typedarray = new Uint8Array(this.result);

            const pdf = await pdfjsLib.getDocument(typedarray).promise;

            let text = "";

            for(let i=1;i<=pdf.numPages;i++){

                const page = await pdf.getPage(i);

                const content = await page.getTextContent();

                const strings = content.items.map(item=>item.str);

                text += strings.join(" ") + " ";
            }

            resolve(text);
        }

        reader.readAsArrayBuffer(file);

    });

}

function findFinancialValue(text, keywords){

    text = text.toLowerCase();

    for(let keyword of keywords){

        let regex = new RegExp(keyword + "[^0-9]{0,20}([0-9,\\.]+)", "i");

        let match = text.match(regex);

        if(match){

            return match[1];
        }
    }

    return "Not Found";
}

function generateScore(text){

    let score = 100;

    let flags = [];

    if(text.includes("qualified opinion")){

        score -= 30;
        flags.push("Qualified Opinion");
    }

    if(text.includes("going concern")){

        score -= 25;
        flags.push("Going Concern Risk");
    }

    if(text.includes("default")){

        score -= 20;
        flags.push("Loan Default Risk");
    }

    if(text.includes("fraud")){

        score -= 40;
        flags.push("Fraud Mentioned");
    }

    if(text.includes("negative cash flow")){

        score -= 20;
        flags.push("Negative Cash Flow");
    }

    if(score < 0){
        score = 0;
    }

    return {score, flags};
}

function updateChart(score){

    const ctx = document.getElementById("chart");

    if(chartObj){
        chartObj.destroy();
    }

    chartObj = new Chart(ctx, {

        type:"bar",

        data:{

            labels:["Financial Health"],

            datasets:[{

                label:"Score",

                data:[score]

            }]
        }

    });

}

async function analyzePDF(){

    const fileInput = document.getElementById("pdfFile");

    if(fileInput.files.length === 0){

        alert("Upload PDF");
        return;
    }

    const file = fileInput.files[0];

    const text = await extractText(file);

    console.log(text);

    document.getElementById("dashboard").style.display = "block";

    // SCORE

    const analysis = generateScore(text.toLowerCase());

    let scoreColor = "green";

    if(analysis.score < 70){
        scoreColor = "orange";
    }

    if(analysis.score < 50){
        scoreColor = "red";
    }

    document.getElementById("healthScore").innerHTML =
    `
    <span class="${scoreColor}">
        ${analysis.score}/100
    </span>
    `;

    // RISK LEVEL

    let risk = "Low Risk";

    if(analysis.score < 70){
        risk = "Medium Risk";
    }

    if(analysis.score < 50){
        risk = "High Risk";
    }

    document.getElementById("riskLevel").innerHTML = risk;

    // AUDIT OPINION

    let opinion = "Clean Opinion";

    if(text.toLowerCase().includes("qualified opinion")){

        opinion = "Qualified Opinion";
    }

    document.getElementById("auditOpinion").innerHTML = opinion;

    // FINANCIAL DATA EXTRACTION

    document.getElementById("revenue").innerHTML =
    findFinancialValue(text, [
        "revenue",
        "total income",
        "sales"
    ]);

    document.getElementById("profit").innerHTML =
    findFinancialValue(text, [
        "net profit",
        "profit after tax",
        "pat"
    ]);

    document.getElementById("expense").innerHTML =
    findFinancialValue(text, [
        "total expenses",
        "expenses"
    ]);

    document.getElementById("operatingProfit").innerHTML =
    findFinancialValue(text, [
        "operating profit",
        "ebitda"
    ]);

    document.getElementById("eps").innerHTML =
    findFinancialValue(text, [
        "eps",
        "earnings per share"
    ]);

    document.getElementById("roe").innerHTML =
    findFinancialValue(text, [
        "roe",
        "return on equity"
    ]);

    document.getElementById("roce").innerHTML =
    findFinancialValue(text, [
        "roce",
        "return on capital employed"
    ]);

    document.getElementById("debt").innerHTML =
    findFinancialValue(text, [
        "borrowings",
        "total debt",
        "debt"
    ]);

    document.getElementById("cashflow").innerHTML =
    findFinancialValue(text, [
        "cash flow",
        "net cash"
    ]);

    // FLAGS

    let flagHTML = "";

    if(analysis.flags.length === 0){

        flagHTML += "<li>No major risk detected</li>";

    }else{

        analysis.flags.forEach(flag=>{

            flagHTML += `<li>${flag}</li>`;
        });
    }

    document.getElementById("flags").innerHTML = flagHTML;

    // CHART

    updateChart(analysis.score);

    // PREVIEW

    document.getElementById("preview").innerText =
    text.substring(0,10000);

}

</script>

</body>
</html>
